<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | PracticeGrid Solutions</title>
<link rel="icon" type="image/png" href="images/favicon.png">
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script defer src="js/script.js"></script>
<style>
    /* Specific overrides for the Thank You page to ensure centering */
    .hero-thank-you {
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: left;
    }
    .back-home {
        margin-top: 30px;
        display: inline-block;
    }
    @media (max-width: 992px) {
        .hero-thank-you .hero-container {
            text-align: center;
        }
    }
</style>
</head>
<body>

<section class="hero hero-thank-you">
  <canvas id="particles"></canvas>
  
  <div class="hero-blob blob-1"></div>
  <div class="hero-blob blob-2"></div>
  
  <div class="container hero-container">
    <div class="hero-left parallax" data-speed="2">
      <div class="logo" style="margin-bottom: 40px;">
        <img src="images/logo.png" alt="PracticeGrid Solutions Logo" style="height: 60px;">
      </div>
      <h1>Thank you for your <br><span style="color: var(--accent-2);">time and response.</span></h1>
      <p style="font-size: 20px; max-width: 500px;">
        Your message has been successfully received. We appreciate your interest in <strong>PracticeGrid Solutions</strong>. Our billing experts are reviewing your details and will be contacting you shortly to discuss your practice goals.
      </p>
      
      <div class="hero-buttons">
        <a href="index.html" class="btn-primary">Return to Home</a>
        <a href="services.html" class="btn-outline">Our Services</a>
      </div>
    </div>

    <div class="hero-right parallax" data-speed="4">
      <img src="https://illustrations.popsy.co/white/thank-you.svg" alt="Thank You Illustration" style="filter: drop-shadow(0 0 30px rgba(139,92,246,0.3)); max-width: 450px;">
    </div>
  </div>
</section>

</body>
</html>
