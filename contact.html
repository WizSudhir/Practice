<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>

    <div class="logo">
        <img src="images/logo.png" alt="PracticeGrid Solutions">
    </div>
</header>

<section class="section">
    <h2>Contact Us</h2>
    <form>

        <button type="submit" class="btn">Send Message</button>
    </form>
</section>

<footer>
    <p>Email: contact@practicegridsolutions.com | Phone: +1 (727) 674-1458</p>
</footer>
